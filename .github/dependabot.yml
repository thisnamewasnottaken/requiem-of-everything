version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly" # Reduces noise; most bugs are patched within a week
      day: "monday"
    
    # CRITICAL: Only update packages listed in your package.json
    # This prevents the bot from updating transitive sub-dependencies directly.
    allow:
      - dependency-type: "direct"

    # Grouping keeps your PR list clean and reduces cross-conflicts.
    # Keep groups narrow and explicit to avoid overlapping lockfile edits.
    groups:
      testing-e2e:
        patterns:
          - "@playwright/*"
      testing-unit:
        patterns:
          - "@testing-library/*"
          - "vitest*"
          - "jsdom"
      i18n-framework:
        # make i18n updates explicit to avoid accidental overlap
        patterns:
          - "i18next"
          - "i18next-http-backend"
          - "react-i18next"
      ui-logic:
        patterns:
          - "motion"
          - "d3"
          - "driver.js"

    # Prevent major version "surprises" that require manual code migration
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
